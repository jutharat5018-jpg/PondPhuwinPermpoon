<!doctype html>
<html lang="en">
 <head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>World Map – PPP Events</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin=""/>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" crossorigin=""></script>
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css"/>
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css"/>
  <script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js"></script>
  <style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body, #app { height: 100%; width: 100%; font-family: 'DM Sans', sans-serif; overflow: hidden; background: #080a12; }

  #map { position: absolute; inset: 0; z-index: 0; }
  .leaflet-tile { filter: brightness(0.85) saturate(0.9); }
  .leaflet-control-zoom { display: none !important; }
  .leaflet-attribution-flag { display: none !important; }

  /* Topbar */
  #topbar {
    position: absolute; top: 0; left: 0; right: 0; z-index: 1000;
    background: linear-gradient(180deg, rgba(8,10,18,0.97) 0%, rgba(8,10,18,0.8) 80%, transparent 100%);
    padding: 0 16px; height: 56px;
    display: flex; align-items: center; gap: 12px;
  }
  .logo { font-family: 'Playfair Display', serif; font-size: 16px; color: #e8d5b7; letter-spacing: 0.04em; }
  .spacer { flex: 1; }
  .map-btn {
    width: 36px; height: 36px;
    background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.12);
    border-radius: 8px; display: flex; align-items: center; justify-content: center;
    cursor: pointer; color: rgba(255,255,255,0.7); transition: all 0.2s; flex-shrink: 0;
  }
  .map-btn:hover { background: rgba(255,255,255,0.15); color: #fff; }

  /* Filter Panel */
  #filter-panel {
    position: absolute; top: 64px; left: 16px; z-index: 1000;
    background: rgba(8,10,18,0.92); border: 1px solid rgba(255,255,255,0.1);
    border-radius: 14px; padding: 16px; width: 230px;
    backdrop-filter: blur(12px);
    transition: transform 0.3s, opacity 0.3s;
    max-height: calc(100vh - 100px); overflow-y: auto;
  }
  #filter-panel.hidden { transform: translateX(-260px); opacity: 0; pointer-events: none; }
  .filter-title {
    font-size: 10px; font-weight: 600; letter-spacing: 0.12em;
    text-transform: uppercase; color: rgba(255,255,255,0.4);
    margin-bottom: 8px; margin-top: 14px;
  }
  .filter-title:first-child { margin-top: 0; }
  .chips { display: flex; flex-wrap: wrap; gap: 6px; }
  .chip {
    display: inline-flex; align-items: center; gap: 5px;
    padding: 4px 10px; border-radius: 20px; font-size: 12px; font-weight: 500;
    cursor: pointer; border: 1.5px solid transparent;
    transition: all 0.18s; user-select: none;
  }
  .chip.off { opacity: 0.35; filter: grayscale(0.6); }
  .chip-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }

  .path-row {
    display: flex; align-items: center; justify-content: space-between;
    padding: 6px 0; cursor: pointer;
  }
  .path-label { font-size: 12px; color: rgba(255,255,255,0.75); }
  .toggle {
    width: 32px; height: 18px; background: rgba(255,255,255,0.15);
    border-radius: 9px; position: relative; transition: background 0.2s;
    cursor: pointer; flex-shrink: 0;
  }
  .toggle.on { background: #6366f1; }
  .toggle::after {
    content: ''; position: absolute; top: 2px; left: 2px;
    width: 14px; height: 14px; background: #fff; border-radius: 50%;
    transition: transform 0.2s;
  }
  .toggle.on::after { transform: translateX(14px); }

  .reset-btn {
    width: 100%; margin-top: 12px; padding: 7px;
    background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.1);
    border-radius: 8px; color: rgba(255,255,255,0.6); font-size: 11px;
    font-weight: 600; cursor: pointer; font-family: 'DM Sans', sans-serif;
    transition: background 0.2s;
  }
  .reset-btn:hover { background: rgba(255,255,255,0.1); }

  /* Map controls */
  #map-controls {
    position: absolute; right: 16px; top: 64px; z-index: 1000;
    display: flex; flex-direction: column; gap: 8px;
  }

  /* Stats bar */
  #stats-bar {
    position: absolute; bottom: 16px; left: 50%; transform: translateX(-50%);
    z-index: 1000; display: flex; gap: 0;
    background: rgba(8,10,18,0.88); border: 1px solid rgba(255,255,255,0.1);
    border-radius: 30px; padding: 8px 20px;
    backdrop-filter: blur(12px); white-space: nowrap;
  }
  .stat-item {
    display: flex; align-items: center; gap: 6px;
    font-size: 12px; color: rgba(255,255,255,0.6); padding: 0 10px;
  }
  .stat-item:not(:last-child) { border-right: 1px solid rgba(255,255,255,0.1); }
  .stat-num { font-weight: 700; color: #fff; font-size: 14px; }
  .stat-dot { width: 8px; height: 8px; border-radius: 50%; }

  /* Loading overlay */
  #loading {
    position: absolute; inset: 0; z-index: 2000;
    background: #080a12; display: flex; flex-direction: column;
    align-items: center; justify-content: center; gap: 16px;
  }
  .spin {
    width: 40px; height: 40px; border: 3px solid rgba(255,255,255,0.1);
    border-top-color: #6366f1; border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  #loading p { font-size: 13px; color: rgba(255,255,255,0.5); }

  /* Leaflet popup */
  .leaflet-popup-content-wrapper {
    background: rgba(10,12,22,0.97) !important;
    border: 1px solid rgba(255,255,255,0.12) !important;
    border-radius: 14px !important; color: #fff !important;
    box-shadow: 0 20px 60px rgba(0,0,0,0.7) !important;
    padding: 0 !important; min-width: 240px;
  }
  .leaflet-popup-tip { background: rgba(10,12,22,0.97) !important; }
  .leaflet-popup-content { margin: 0 !important; padding: 0 !important; width: auto !important; }
  .popup-wrap { overflow: hidden; border-radius: 14px; }
  .popup-img { width: 100%; height: 110px; object-fit: cover; display: block; }
  .popup-img-ph { width: 100%; height: 70px; display: flex; align-items: center; justify-content: center; font-size: 28px; }
  .popup-body { padding: 12px 14px; }
  .popup-badge {
    display: inline-flex; align-items: center; gap: 5px;
    font-size: 10px; font-weight: 600; letter-spacing: 0.08em;
    text-transform: uppercase; padding: 3px 8px; border-radius: 20px; margin-bottom: 7px;
  }
  .popup-title { font-family: 'Playfair Display', serif; font-size: 14px; font-weight: 600; color: #fff; margin-bottom: 7px; line-height: 1.3; }
  .popup-meta { font-size: 11px; color: rgba(255,255,255,0.5); margin-bottom: 3px; display: flex; align-items: flex-start; gap: 5px; line-height: 1.4; }
  .popup-btn {
    flex: 1; padding: 7px 10px; border-radius: 8px; font-size: 11px;
    font-weight: 600; cursor: pointer; text-align: center; border: none;
    font-family: 'DM Sans', sans-serif; transition: all 0.18s;
    background: rgba(99,102,241,0.25); color: #a5b4fc;
    border: 1px solid rgba(99,102,241,0.4) !important;
    display: block; width: 100%; margin-top: 10px;
  }
  .popup-btn:hover { background: rgba(99,102,241,0.4); }
  .popup-list-item {
    padding: 10px 14px; border-bottom: 1px solid rgba(255,255,255,0.06);
    cursor: pointer; transition: background 0.15s;
  }
  .popup-list-item:hover { background: rgba(255,255,255,0.04); }
  .popup-list-item:last-child { border-bottom: none; }

  /* Cluster */
  .marker-cluster-small, .marker-cluster-medium, .marker-cluster-large {
    background-color: rgba(30,32,50,0.85) !important;
  }
  .marker-cluster-small div, .marker-cluster-medium div, .marker-cluster-large div {
    background-color: rgba(99,102,241,0.7) !important;
    color: #fff !important; font-weight: 700; font-family: 'DM Sans', sans-serif;
  }

  /* Detail Modal */
  #detail-modal {
    position: absolute; inset: 0; z-index: 3000;
    background: rgba(0,0,0,0.6); display: none;
    align-items: center; justify-content: center; padding: 1rem;
    backdrop-filter: blur(4px);
  }
  #detail-modal.show { display: flex; }
  .detail-box {
    background: #0f1117; border: 1px solid rgba(255,255,255,0.1);
    border-radius: 20px; max-width: 600px; width: 100%;
    max-height: 90vh; overflow-y: auto;
    box-shadow: 0 30px 80px rgba(0,0,0,0.8);
  }
  .detail-img { width: 100%; max-height: 300px; object-fit: cover; display: block; border-radius: 20px 20px 0 0; }
  .detail-img-ph { width: 100%; height: 160px; display: flex; align-items: center; justify-content: center; background: linear-gradient(135deg,#1a1d2e,#0f1117); font-size: 48px; border-radius: 20px 20px 0 0; }
  .detail-body { padding: 1.25rem; }
  .detail-badge { display: inline-flex; align-items: center; gap: 5px; font-size: 11px; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; padding: 4px 10px; border-radius: 20px; margin-bottom: 0.75rem; }
  .detail-title { font-family: 'Playfair Display', serif; font-size: 1.4rem; font-weight: 700; color: #fff; margin-bottom: 1rem; line-height: 1.3; }
  .detail-meta-row { display: flex; align-items: center; gap: 8px; font-size: 0.88rem; color: rgba(255,255,255,0.6); margin-bottom: 6px; }
  .detail-desc { font-size: 0.85rem; color: rgba(255,255,255,0.55); line-height: 1.6; margin-top: 1rem; border-top: 1px solid rgba(255,255,255,0.08); padding-top: 1rem; }
  .detail-links { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 1rem; }
  .detail-link { display: flex; align-items: center; justify-content: center; width: 38px; height: 38px; border-radius: 50%; background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.1); text-decoration: none; transition: background 0.2s; }
  .detail-link:hover { background: rgba(255,255,255,0.15); }
  .close-btn { position: absolute; top: 12px; right: 12px; background: rgba(0,0,0,0.5); border: none; border-radius: 50%; width: 32px; height: 32px; display: flex; align-items: center; justify-content: center; cursor: pointer; color: #fff; z-index: 10; }

  @media (max-width: 640px) {
    #filter-panel { width: 210px; }
    #stats-bar { padding: 6px 12px; }
    .stat-item { padding: 0 6px; font-size: 11px; }
  }
  </style>
 </head>
 <body>
  <div id="app" style="position:relative;width:100%;height:100%;">

   <!-- Loading -->
   <div id="loading">
    <div class="spin"></div>
    <p>กำลังโหลดข้อมูลอีเวนท์...</p>
   </div>

   <!-- Map -->
   <div id="map"></div>

   <!-- Topbar -->
   <div id="topbar">
    <div class="logo">PPP Events Map</div>
    <a href="index.html" style="display:flex;align-items:center;gap:6px;font-size:12px;font-weight:500;color:rgba(255,255,255,0.55);padding:5px 10px;border-radius:6px;text-decoration:none;transition:all 0.2s;margin-left:8px;" onmouseover="this.style.color='#fff';this.style.background='rgba(255,255,255,0.08)'" onmouseout="this.style.color='rgba(255,255,255,0.55)';this.style.background='transparent'">
     <i data-lucide="arrow-left" style="width:13px;height:13px;"></i> Back
    </a>
    <div class="spacer"></div>
    <button class="map-btn" onclick="toggleFilterPanel()" title="Filters">
     <i data-lucide="sliders-horizontal" style="width:15px;height:15px;"></i>
    </button>
   </div>

   <!-- Filter Panel -->
   <div id="filter-panel">
    <div class="filter-title">Members</div>
    <div class="chips" id="member-chips"></div>

    <div class="filter-title">Time</div>
    <div class="chips">
     <button data-time="all" onclick="setTimeFilter('all')" class="chip time-chip" style="border-color:rgba(255,255,255,0.4);background:rgba(255,255,255,0.15);color:#fff;">All</button>
     <button data-time="upcoming" onclick="setTimeFilter('upcoming')" class="chip time-chip" style="border-color:rgba(255,255,255,0.15);background:transparent;color:rgba(255,255,255,0.5);">Upcoming</button>
     <button data-time="past" onclick="setTimeFilter('past')" class="chip time-chip" style="border-color:rgba(255,255,255,0.15);background:transparent;color:rgba(255,255,255,0.5);">Past</button>
    </div>

    <div class="filter-title">Travel Path</div>
    <div id="path-toggles"></div>

    <button class="reset-btn" onclick="resetFilters()">Reset Filters</button>
   </div>

   <!-- Map Controls -->
   <div id="map-controls">
    <button class="map-btn" onclick="map&&map.zoomIn()" title="Zoom In">
     <i data-lucide="plus" style="width:16px;height:16px;"></i>
    </button>
    <button class="map-btn" onclick="map&&map.zoomOut()" title="Zoom Out">
     <i data-lucide="minus" style="width:16px;height:16px;"></i>
    </button>
    <button class="map-btn" onclick="fitAll()" title="Fit all">
     <i data-lucide="maximize-2" style="width:15px;height:15px;"></i>
    </button>
   </div>

   <!-- Stats bar -->
   <div id="stats-bar">
    <div class="stat-item">
     <div class="stat-dot" style="background:#f97316;"></div>
     <span>Pond</span> <span class="stat-num" id="cnt-pond">0</span>
    </div>
    <div class="stat-item">
     <div class="stat-dot" style="background:#6b7280;"></div>
     <span>Phuwin</span> <span class="stat-num" id="cnt-phuwin">0</span>
    </div>
    <div class="stat-item">
     <div class="stat-dot" style="background:#22c55e;"></div>
     <span>Permpoon</span> <span class="stat-num" id="cnt-permpoon">0</span>
    </div>
    <div class="stat-item" style="border-left:1px solid rgba(255,255,255,0.1);">
     <i data-lucide="map-pin" style="width:13px;height:13px;color:rgba(255,255,255,0.4);"></i>
     <span>Total</span> <span class="stat-num" id="cnt-total">0</span>
    </div>
   </div>

   <!-- Detail Modal -->
   <div id="detail-modal" onclick="if(event.target===this)closeDetail()">
    <div class="detail-box" onclick="event.stopPropagation()" style="position:relative;">
     <button class="close-btn" onclick="closeDetail()">
      <i data-lucide="x" style="width:16px;height:16px;stroke-width:2.5;"></i>
     </button>
     <div id="detail-img-wrap"></div>
     <div class="detail-body">
      <div id="detail-badge"></div>
      <div id="detail-title" class="detail-title"></div>
      <div id="detail-meta"></div>
      <div id="detail-desc" class="detail-desc" style="display:none;"></div>
      <div id="detail-links" class="detail-links" style="display:none;"></div>
     </div>
    </div>
   </div>

  </div>

  <script>
  // ─── CONFIG ──────────────────────────────────────────────────────────────────
  const API_URL = 'https://script.google.com/macros/s/AKfycbwRvT8rv6WnMu7nIXtVxgHuyRToB9AraT5HS0SSjB5mv4KQcXy5bDrqJNy1ylZyTaiR0A/exec';

  const MEMBERS = {
    Pond:     { color: '#f97316', bg: 'rgba(249,115,22,0.15)'  },
    Phuwin:   { color: '#6b7280', bg: 'rgba(107,114,128,0.15)' },
    Permpoon: { color: '#22c55e', bg: 'rgba(34,197,94,0.15)'   },
  };

  const CITY_COORDS = {
    'bangkok': [13.7563, 100.5018],   'chiang mai': [18.7883, 98.9853],
    'phuket': [7.8804, 98.3923],      'pattaya': [12.9236, 100.8825],
    'khon kaen': [16.4419, 102.8360], 'hat yai': [7.0067, 100.4747],

    'kyoto': [35.0116, 135.7681],     'fukuoka': [33.5904, 130.4017],
    'nagoya': [35.1815, 136.9066],    'sapporo': [43.0618, 141.3545],
    'seoul': [37.5665, 126.9780],     'busan': [35.1796, 129.0756],
    'singapore': [1.3521, 103.8198],
    'manila': [14.5995, 120.9842],    'cebu': [10.3157, 123.8854],
    'jakarta': [-6.2088, 106.8456],   'bali': [-8.3405, 115.0920],
    'kuala lumpur': [3.1390, 101.6869], 'penang': [5.4141, 100.3288],
    'hong kong': [22.3193, 114.1694],
    'taipei': [25.0330, 121.5654],    'kaohsiung': [22.6273, 120.3014],
    'beijing': [39.9042, 116.4074],   'shanghai': [31.2304, 121.4737],
    'guangzhou': [23.1291, 113.2644], 'shenzhen': [22.5431, 114.0579],
    'chengdu': [30.5728, 104.0668],   'xi\'an': [34.3416, 108.9398],
    'ho chi minh': [10.8231, 106.6297], 'hanoi': [21.0285, 105.8542],
    'yangon': [16.8661, 96.1951],     'phnom penh': [11.5564, 104.9282],
    'vientiane': [17.9757, 102.6331], 'colombo': [6.9271, 79.8612],
    'mumbai': [19.0760, 72.8777],     'delhi': [28.6139, 77.2090],
    'bangalore': [12.9716, 77.5946],  'chennai': [13.0827, 80.2707],
    'london': [51.5074, -0.1278],     'paris': [48.8566, 2.3522],
    'berlin': [52.5200, 13.4050],     'amsterdam': [52.3676, 4.9041],
    'madrid': [40.4168, -3.7038],     'rome': [41.9028, 12.4964],
    'new york': [40.7128, -74.0060],  'los angeles': [34.0522, -118.2437],
    'chicago': [41.8781, -87.6298],   'san francisco': [37.7749, -122.4194],
    'toronto': [43.6532, -79.3832],   'vancouver': [49.2827, -123.1207],
    'sydney': [-33.8688, 151.2093],   'melbourne': [-37.8136, 144.9631],
    'auckland': [-36.8509, 174.7645],
    'dubai': [25.2048, 55.2708],      'abu dhabi': [24.4539, 54.3773],
    'riyadh': [24.6877, 46.7219],
    'thailand': [15.0, 101.0],        'japan': [36.2, 138.25],
    'south korea': [36.5, 127.5],     'korea': [36.5, 127.5],
    'indonesia': [-5.0, 120.0],       'philippines': [13.0, 122.0],
    'malaysia': [4.2, 108.0],         'vietnam': [14.0, 108.0],
    'taiwan': [23.7, 121.0],          'china': [35.0, 104.0],
    'usa': [38.0, -97.0],             'uk': [54.0, -2.0],
    'france': [46.0, 2.0],            'australia': [-25.0, 134.0],
    'india': [20.0, 77.0],            'uae': [24.0, 54.0],
    'cambodia': [12.5657, 104.9910],  'myanmar': [19.1633, 96.0785],
    'laos': [19.8563, 102.4955],
  };

  // ─── STATE ───────────────────────────────────────────────────────────────────
  let allEvents = [];
  let map, clusterGroup;
  let filterMembers = new Set(['Pond','Phuwin','Permpoon']);
  let filterTime = 'all';
  let pathEnabled = { Pond:false, Phuwin:false, Permpoon:false };
  let pathLayers = { Pond:null, Phuwin:null, Permpoon:null };
  let filterPanelOpen = true;

  // ─── HELPERS ─────────────────────────────────────────────────────────────────
  function esc(str) {
    if (!str) return '';
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function getColor(artists) {
    if (!artists) return '#64748b';
    const arr = artists.split(',').map(a => a.trim());
    const has = x => arr.includes(x);
    if (has('Pond') && has('Phuwin') && has('Permpoon')) return '#ec4899';
    if (has('Pond') && has('Phuwin'))   return '#a855f7';
    if (has('Pond') && has('Permpoon')) return '#3b82f6';
    if (has('Phuwin') && has('Permpoon')) return '#ef4444';
    if (has('Pond'))     return '#f97316';
    if (has('Phuwin'))   return '#6b7280';
    if (has('Permpoon')) return '#22c55e';
    return '#64748b';
  }

  function getLabel(artists) {
    if (!artists) return '';
    return artists.split(',').map(a => a.trim()).filter(Boolean).join(' · ');
  }

  function isPast(ev) {
    if (!ev.date) return false;
    const end = ev.end_time || ev.start_time || '23:59';
    return new Date(ev.date + 'T' + end) < new Date();
  }

  function fmtDate(dateStr) {
    if (!dateStr) return 'TBA';
    return new Date(dateStr + 'T00:00:00').toLocaleDateString('en-US', { weekday:'short', month:'short', day:'numeric', year:'numeric' });
  }

  function getCoords(ev) {
    const city    = (ev.city    || '').toLowerCase().trim();
    const country = (ev.country || '').toLowerCase().trim();
    // Exact match
    if (city    && CITY_COORDS[city])    return CITY_COORDS[city];
    if (country && CITY_COORDS[country]) return CITY_COORDS[country];
    // Partial match
    for (const [k, v] of Object.entries(CITY_COORDS)) {
      if (city    && city.includes(k))    return v;
      if (city    && k.includes(city) && city.length > 2) return v;
      if (country && country.includes(k)) return v;
      if (country && k.includes(country) && country.length > 2) return v;
    }
    return null;
  }

  // ─── API (JSONP to bypass CORS) ─────────────────────────────────────────────
  function loadEvents() {
    return new Promise((resolve, reject) => {
      const cbName = '__pppMapCb_' + Date.now();
      const timeout = setTimeout(() => {
        delete window[cbName];
        // Fallback: try fetch with no-cors workaround via GET
        fetch(API_URL + '?action=getEvents&callback=' + cbName)
          .then(r => r.text()).then(text => {
            try {
              const json = JSON.parse(text.replace(/^[^(]+\(/, '').replace(/\);?$/, ''));
              resolve(mapEvents(json.events || []));
            } catch(e) { reject(new Error('Parse error')); }
          }).catch(reject);
      }, 5000);

      window[cbName] = (data) => {
        clearTimeout(timeout);
        delete window[cbName];
        script.remove();
        if (data.status !== 'ok') { reject(new Error(data.message || 'API error')); return; }
        resolve(mapEvents(data.events || []));
      };

      const script = document.createElement('script');
      script.onerror = () => { clearTimeout(timeout); delete window[cbName]; reject(new Error('Script load failed')); };
      script.src = API_URL + '?action=getEvents&callback=' + cbName;
      document.head.appendChild(script);
    });
  }

  function mapEvents(events) {
    return events.map(r => ({
      __id: r.id || '',
      event_name:    r.event_name    || '',
      image_url:     r.image_url     || '',
      artists:       r.artists       || '',
      date:          r.date          || '',
      date_end:      r.date_end      || '',
      start_time:    r.start_time    || '',
      end_time:      r.end_time      || '',
      location_name: r.location_name || '',
      city:          r.city          || '',
      country:       r.country       || '',
      description:   r.description   || '',
      event_type:    r.event_type    || '',
      note:          r.note          || '',
      youtube_link:  r.youtube_link  || '',
      instagram_link:r.instagram_link|| '',
      facebook_link: r.facebook_link || '',
      x_link:        r.x_link        || '',
      tiktok_link:   r.tiktok_link   || '',
      whatsapp_link: r.whatsapp_link || '',
      shopee_link:   r.shopee_link   || '',
      live_link:     r.live_link     || '',
      file_link:     r.file_link     || '',
    }));
  }

  // ─── MARKER ICON ─────────────────────────────────────────────────────────────
  function createIcon(color, past) {
    const op = past ? 0.55 : 1;
    const svg = `<svg xmlns="http://www.w3.org/2000/svg" width="28" height="36" viewBox="0 0 28 36" opacity="${op}">
      <defs><filter id="sh"><feDropShadow dx="0" dy="3" stdDeviation="3" flood-color="rgba(0,0,0,0.5)"/></filter></defs>
      <path d="M14 0C6.27 0 0 6.27 0 14c0 10 14 22 14 22s14-12 14-22C28 6.27 21.73 0 14 0z"
        fill="${color}" filter="url(#sh)" stroke="rgba(255,255,255,0.5)" stroke-width="1.5"/>
      <circle cx="14" cy="14" r="6" fill="rgba(255,255,255,0.9)"/>
    </svg>`;
    return L.divIcon({ className:'', html:svg, iconSize:[28,36], iconAnchor:[14,36], popupAnchor:[0,-38] });
  }

  // ─── POPUP HTML ──────────────────────────────────────────────────────────────
  function singlePopup(ev) {
    const color = getColor(ev.artists);
    const lp    = [ev.location_name, ev.city, ev.country].filter(Boolean).join(', ');
    const img   = ev.image_url
      ? `<img src="${esc(ev.image_url)}" class="popup-img" onerror="this.style.display='none'" loading="lazy"/>`
      : `<div class="popup-img-ph" style="background:linear-gradient(135deg,${color}22,${color}44);">🎵</div>`;
    return `<div class="popup-wrap">${img}
      <div class="popup-body">
        <div class="popup-badge" style="background:${color}22;color:${color};border:1px solid ${color}44;">
          ${esc(getLabel(ev.artists) || 'Event')} ${isPast(ev) ? '· Past' : '· Upcoming'}
        </div>
        <div class="popup-title">${esc(ev.event_name)}</div>
        <div class="popup-meta">📅 ${fmtDate(ev.date)}${ev.start_time ? ' · ' + ev.start_time : ''}</div>
        ${lp ? `<div class="popup-meta">📍 ${esc(lp)}</div>` : ''}
        ${ev.event_type ? `<div class="popup-meta">🎪 ${esc(ev.event_type)}</div>` : ''}
        <button class="popup-btn" onclick="openDetail('${ev.__id}')">View Details →</button>
      </div>
    </div>`;
  }

  function multiPopup(events) {
    const items = events.map(ev => {
      const color = getColor(ev.artists);
      return `<div class="popup-list-item" onclick="openDetail('${ev.__id}')">
        <div style="display:flex;align-items:center;gap:8px;">
          <div style="width:8px;height:8px;border-radius:50%;background:${color};flex-shrink:0;"></div>
          <div>
            <div style="font-size:13px;font-weight:600;color:#fff;line-height:1.3;">${esc(ev.event_name)}</div>
            <div style="font-size:11px;color:rgba(255,255,255,0.45);margin-top:2px;">${fmtDate(ev.date)} · ${esc(getLabel(ev.artists))}</div>
          </div>
        </div>
      </div>`;
    }).join('');
    return `<div class="popup-wrap">
      <div style="padding:12px 14px 8px;border-bottom:1px solid rgba(255,255,255,0.08);">
        <div style="font-size:11px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;color:rgba(255,255,255,0.4);">${events.length} Events at this location</div>
      </div>${items}
    </div>`;
  }

  // ─── DETAIL MODAL ────────────────────────────────────────────────────────────
  const SOCIAL_ICONS = {
    youtube:   `<svg viewBox="0 0 24 24" width="20" height="20"><path fill="#FF0000" d="M23.498 6.186a3.016 3.016 0 0 0-2.122-2.136C19.505 3.545 12 3.545 12 3.545s-7.505 0-9.377.505A3.017 3.017 0 0 0 .502 6.186C0 8.07 0 12 0 12s0 3.93.502 5.814a3.016 3.016 0 0 0 2.122 2.136c1.871.505 9.376.505 9.376.505s7.505 0 9.377-.505a3.015 3.015 0 0 0 2.122-2.136C24 15.93 24 12 24 12s0-3.93-.502-5.814zM9.545 15.568V8.432L15.818 12l-6.273 3.568z"/></svg>`,
    instagram: `<svg viewBox="0 0 24 24" width="20" height="20"><defs><radialGradient id="ig" cx="30%" cy="107%" r="150%"><stop offset="0%" stop-color="#fdf497"/><stop offset="45%" stop-color="#fd5949"/><stop offset="60%" stop-color="#d6249f"/><stop offset="90%" stop-color="#285AEB"/></radialGradient></defs><path fill="url(#ig)" d="M12 2.163c3.204 0 3.584.012 4.85.07 3.252.148 4.771 1.691 4.919 4.919.058 1.265.069 1.645.069 4.849 0 3.205-.012 3.584-.069 4.849-.149 3.225-1.664 4.771-4.919 4.919-1.266.058-1.644.07-4.85.07-3.204 0-3.584-.012-4.849-.07-3.26-.149-4.771-1.699-4.919-4.92-.058-1.265-.07-1.644-.07-4.849 0-3.204.013-3.583.07-4.849.149-3.227 1.664-4.771 4.919-4.919 1.266-.057 1.645-.069 4.849-.069zm0-2.163c-3.259 0-3.667.014-4.947.072-4.358.2-6.78 2.618-6.98 6.98-.059 1.281-.073 1.689-.073 4.948 0 3.259.014 3.668.072 4.948.2 4.358 2.618 6.78 6.98 6.98 1.281.058 1.689.072 4.948.072 3.259 0 3.668-.014 4.948-.072 4.354-.2 6.782-2.618 6.979-6.98.059-1.28.073-1.689.073-4.948 0-3.259-.014-3.667-.072-4.947-.196-4.354-2.617-6.78-6.979-6.98-1.281-.059-1.69-.073-4.949-.073zm0 5.838c-3.403 0-6.162 2.759-6.162 6.162s2.759 6.163 6.162 6.163 6.162-2.759 6.162-6.163c0-3.403-2.759-6.162-6.162-6.162zm0 10.162c-2.209 0-4-1.79-4-4 0-2.209 1.791-4 4-4s4 1.791 4 4c0 2.21-1.791 4-4 4zm6.406-11.845c-.796 0-1.441.645-1.441 1.44s.645 1.44 1.441 1.44c.795 0 1.439-.645 1.439-1.44s-.644-1.44-1.439-1.44z"/></svg>`,
    facebook:  `<svg viewBox="0 0 24 24" width="20" height="20"><path fill="#1877F2" d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/></svg>`,
    x:         `<svg viewBox="0 0 24 24" width="20" height="20"><path fill="#fff" d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-4.714-6.231-5.401 6.231H2.747l7.73-8.835L1.254 2.25H8.08l4.259 5.629L18.244 2.25zm-1.161 17.52h1.833L7.084 4.126H5.117z"/></svg>`,
    tiktok:    `<svg viewBox="0 0 24 24" width="20" height="20"><rect width="24" height="24" rx="6" fill="#010101"/><path fill="white" d="M19.59 6.69a4.83 4.83 0 01-3.77-4.25V2h-3.45v13.67a2.89 2.89 0 01-2.88 2.5 2.89 2.89 0 01-2.89-2.89 2.89 2.89 0 012.89-2.89c.28 0 .54.04.79.1V9.01a6.31 6.31 0 00-.79-.05 6.34 6.34 0 00-6.34 6.34 6.34 6.34 0 006.34 6.34 6.34 6.34 0 006.33-6.34V8.69a8.18 8.18 0 004.78 1.52V6.75a4.85 4.85 0 01-1.01-.06z"/></svg>`,
  };

  function openDetail(id) {
    const ev = allEvents.find(e => e.__id === id);
    if (!ev) return;
    if (map) map.closePopup();

    const color = getColor(ev.artists);
    const lp    = [ev.location_name, ev.city, ev.country].filter(Boolean).join(', ');

    // Image
    const imgWrap = document.getElementById('detail-img-wrap');
    imgWrap.innerHTML = ev.image_url
      ? `<img src="${esc(ev.image_url)}" class="detail-img" onerror="this.outerHTML='<div class=detail-img-ph>🎵</div>'" loading="lazy"/>`
      : `<div class="detail-img-ph">🎵</div>`;

    // Badge
    document.getElementById('detail-badge').innerHTML =
      `<div class="detail-badge" style="background:${color}22;color:${color};border:1px solid ${color}44;">${esc(getLabel(ev.artists)||'Event')} ${isPast(ev)?'· Past':'· Upcoming'}</div>`;

    // Title
    document.getElementById('detail-title').textContent = ev.event_name;

    // Meta
    let metaHtml = '';
    if (ev.date)         metaHtml += `<div class="detail-meta-row">📅 ${fmtDate(ev.date)}${ev.start_time?' · '+ev.start_time:''}</div>`;
    if (lp)              metaHtml += `<div class="detail-meta-row">📍 ${esc(lp)}</div>`;
    if (ev.event_type)   metaHtml += `<div class="detail-meta-row">🎪 ${esc(ev.event_type)}</div>`;
    if (ev.note)         metaHtml += `<div class="detail-meta-row">📝 ${esc(ev.note)}</div>`;
    document.getElementById('detail-meta').innerHTML = metaHtml;

    // Desc
    const descEl = document.getElementById('detail-desc');
    if (ev.description) { descEl.textContent = ev.description; descEl.style.display = 'block'; }
    else descEl.style.display = 'none';

    // Links
    const linksEl = document.getElementById('detail-links');
    let linksHtml = '';
    if (ev.youtube_link)   linksHtml += `<a href="${esc(ev.youtube_link)}" target="_blank" class="detail-link">${SOCIAL_ICONS.youtube}</a>`;
    if (ev.instagram_link) linksHtml += `<a href="${esc(ev.instagram_link)}" target="_blank" class="detail-link">${SOCIAL_ICONS.instagram}</a>`;
    if (ev.facebook_link)  linksHtml += `<a href="${esc(ev.facebook_link)}" target="_blank" class="detail-link">${SOCIAL_ICONS.facebook}</a>`;
    if (ev.x_link)         linksHtml += `<a href="${esc(ev.x_link)}" target="_blank" class="detail-link">${SOCIAL_ICONS.x}</a>`;
    if (ev.tiktok_link)    linksHtml += `<a href="${esc(ev.tiktok_link)}" target="_blank" class="detail-link">${SOCIAL_ICONS.tiktok}</a>`;
    if (linksHtml) { linksEl.innerHTML = linksHtml; linksEl.style.display = 'flex'; }
    else linksEl.style.display = 'none';

    document.getElementById('detail-modal').classList.add('show');
    if (typeof lucide !== 'undefined') lucide.createIcons();
  }

  function closeDetail() {
    document.getElementById('detail-modal').classList.remove('show');
  }

  // ─── FILTERS ─────────────────────────────────────────────────────────────────
  function getFiltered() {
    return allEvents.filter(ev => {
      if (!ev.city && !ev.country) return false;
      const artists = (ev.artists || '').split(',').map(a => a.trim());
      if (!artists.some(a => filterMembers.has(a))) return false;
      if (filterTime === 'upcoming' && isPast(ev)) return false;
      if (filterTime === 'past'     && !isPast(ev)) return false;
      return true;
    });
  }

  function buildMemberChips() {
    const el = document.getElementById('member-chips');
    el.innerHTML = '';
    Object.entries(MEMBERS).forEach(([name, cfg]) => {
      const chip = document.createElement('div');
      chip.className = 'chip';
      chip.dataset.member = name;
      chip.style.cssText = `border-color:${cfg.color}66;background:${cfg.bg};color:${cfg.color};`;
      chip.innerHTML = `<div class="chip-dot" style="background:${cfg.color};"></div>${name}`;
      chip.onclick = () => toggleMember(name);
      el.appendChild(chip);
    });
  }

  function buildPathToggles() {
    const el = document.getElementById('path-toggles');
    el.innerHTML = '';
    Object.entries(MEMBERS).forEach(([name]) => {
      el.innerHTML += `<div class="path-row" onclick="togglePath('${name}')">
        <span class="path-label">${name}'s Path</span>
        <div class="toggle" id="tog-${name.toLowerCase()}"></div>
      </div>`;
    });
  }

  function toggleMember(name) {
    if (filterMembers.has(name)) {
      if (filterMembers.size === 1) return;
      filterMembers.delete(name);
    } else { filterMembers.add(name); }
    document.querySelectorAll('[data-member]').forEach(c => {
      c.classList.toggle('off', !filterMembers.has(c.dataset.member));
    });
    renderMarkers();
  }

  function setTimeFilter(v) {
    filterTime = v;
    document.querySelectorAll('.time-chip').forEach(btn => {
      const active = btn.dataset.time === v;
      btn.style.background     = active ? 'rgba(255,255,255,0.15)' : 'transparent';
      btn.style.color          = active ? '#fff' : 'rgba(255,255,255,0.5)';
      btn.style.borderColor    = active ? 'rgba(255,255,255,0.4)' : 'rgba(255,255,255,0.15)';
    });
    renderMarkers();
  }

  function togglePath(member) {
    pathEnabled[member] = !pathEnabled[member];
    const tog = document.getElementById('tog-' + member.toLowerCase());
    if (tog) tog.classList.toggle('on', pathEnabled[member]);
    renderMarkers();
  }

  function resetFilters() {
    filterMembers = new Set(['Pond','Phuwin','Permpoon']);
    filterTime = 'all';
    document.querySelectorAll('[data-member]').forEach(c => c.classList.remove('off'));
    setTimeFilter('all');
    Object.keys(pathEnabled).forEach(m => {
      pathEnabled[m] = false;
      const tog = document.getElementById('tog-' + m.toLowerCase());
      if (tog) tog.classList.remove('on');
    });
    renderMarkers();
  }

  function toggleFilterPanel() {
    filterPanelOpen = !filterPanelOpen;
    document.getElementById('filter-panel').classList.toggle('hidden', !filterPanelOpen);
  }

  // ─── RENDER MARKERS ──────────────────────────────────────────────────────────
  function renderMarkers() {
    clusterGroup.clearLayers();

    // Clear paths
    Object.keys(pathLayers).forEach(m => {
      if (pathLayers[m]) { map.removeLayer(pathLayers[m]); pathLayers[m] = null; }
    });

    const events = getFiltered();
    const locMap = {};
    events.forEach(ev => {
      const coords = getCoords(ev);
      if (!coords) return;
      const key = coords[0].toFixed(2) + ',' + coords[1].toFixed(2);
      if (!locMap[key]) locMap[key] = { coords, evs:[] };
      locMap[key].evs.push(ev);
    });

    Object.values(locMap).forEach(({ coords, evs }) => {
      const color = getColor(evs[0].artists);
      const past  = evs.every(isPast);
      const icon  = createIcon(color, past);
      const marker = L.marker(coords, { icon });
      const html   = evs.length === 1 ? singlePopup(evs[0]) : multiPopup(evs);
      marker.bindPopup(html, { maxWidth:300, minWidth:240 });
      clusterGroup.addLayer(marker);
    });

    // Stats
    document.getElementById('cnt-pond').textContent     = events.filter(e=>(e.artists||'').includes('Pond')).length;
    document.getElementById('cnt-phuwin').textContent   = events.filter(e=>(e.artists||'').includes('Phuwin')).length;
    document.getElementById('cnt-permpoon').textContent = events.filter(e=>(e.artists||'').includes('Permpoon')).length;
    document.getElementById('cnt-total').textContent    = events.length;

    // Draw paths
    Object.keys(pathEnabled).forEach(member => {
      if (!pathEnabled[member]) return;
      const mevs = events.filter(e=>(e.artists||'').includes(member)).sort((a,b)=>a.date.localeCompare(b.date));
      if (mevs.length < 2) return;
      const latlngs = mevs.map(getCoords).filter(Boolean);
      pathLayers[member] = L.polyline(latlngs, {
        color: MEMBERS[member].color, weight:2.5, opacity:0.65, dashArray:'6,8'
      }).addTo(map);
    });
  }

  function fitAll() {
    const points = getFiltered().map(getCoords).filter(Boolean);
    if (!points.length) return;
    map.fitBounds(L.latLngBounds(points), { padding:[60,60] });
  }

  // ─── INIT ─────────────────────────────────────────────────────────────────────
  async function init() {
    try {
      allEvents = await loadEvents();
    } catch(e) {
      document.getElementById('loading').innerHTML =
        `<p style="color:#ef4444;font-size:13px;">โหลดข้อมูลไม่สำเร็จ: ${e.message}</p>`;
      return;
    }

    // Hide loading
    document.getElementById('loading').style.display = 'none';

    // Init map
    map = L.map('map', { center:[20,20], zoom:3, zoomControl:false });
    L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
      attribution:'&copy; <a href="https://carto.com/">CARTO</a> &copy; <a href="https://openstreetmap.org/copyright">OSM</a>',
      subdomains:'abcd', maxZoom:19
    }).addTo(map);

    clusterGroup = L.markerClusterGroup({
      maxClusterRadius: 50,
      iconCreateFunction: c => L.divIcon({
        className: '',
        html: `<div style="width:40px;height:40px;background:rgba(10,12,22,0.9);border:2px solid rgba(99,102,241,0.6);border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:'DM Sans',sans-serif;font-weight:700;font-size:13px;color:#a5b4fc;box-shadow:0 4px 16px rgba(0,0,0,0.5),0 0 0 4px rgba(99,102,241,0.1);">${c.getChildCount()}</div>`,
        iconSize:[40,40], iconAnchor:[20,20]
      })
    });
    map.addLayer(clusterGroup);

    buildMemberChips();
    buildPathToggles();
    renderMarkers();

    setTimeout(() => fitAll(), 400);
    if (typeof lucide !== 'undefined') lucide.createIcons();
  }

  document.addEventListener('DOMContentLoaded', init);
  </script>
 </body>
</html>
